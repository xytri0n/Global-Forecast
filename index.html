<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Global Forecast</title>

<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" rel="stylesheet" />

<style>
:root {
  --bg: #0b1220;
  --card: rgba(18, 26, 43, 0.6);
  --card-hover: rgba(25, 35, 55, 0.8);
  --text: #ffffff;
  --muted: #a9b4c7;
  --accent: #4da3ff;
  --glass-border: rgba(255, 255, 255, 0.05);
}

body.light {
  --bg: #eaf2ff;
  --card: rgba(255, 255, 255, 0.6);
  --card-hover: rgba(255, 255, 255, 0.9);
  --text: #1a1a2e;
  --muted: #556b8d;
  --accent: #0077ff;
  --glass-border: rgba(0, 0, 0, 0.05);
}

body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  background: var(--bg);
  color: var(--text);
  transition: background-color 0.4s ease, color 0.4s ease;
  min-height: 100vh;
}

.topbar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 20px;
  max-width: 900px;
  margin: auto;
}

.city {
  font-size: 24px;
  font-weight: 700;
  letter-spacing: 0.5px;
}

.icon-btn {
  cursor: pointer;
  font-size: 28px;
  transition: transform 0.2s;
}

.icon-btn:hover {
  transform: rotate(90deg);
}

/* Glassmorphism Settings Menu */
.settings {
  position: absolute;
  top: 70px;
  right: 20px;
  width: 260px;
  background: var(--card);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  padding: 20px;
  border-radius: 16px;
  border: 1px solid var(--glass-border);
  box-shadow: 0 10px 30px rgba(0,0,0,0.2);
  display: none;
  z-index: 100;
}

.settings label {
  font-size: 13px;
  font-weight: bold;
  color: var(--muted);
  text-transform: uppercase;
  margin-top: 10px;
  display: block;
}

.settings input, .settings select {
  width: 100%;
  padding: 10px;
  margin-top: 5px;
  margin-bottom: 10px;
  border-radius: 8px;
  border: 1px solid var(--glass-border);
  background: rgba(128, 128, 128, 0.1);
  color: var(--text);
  box-sizing: border-box;
  outline: none;
  font-family: inherit;
}

.settings button {
  margin-top: 10px;
  width: 100%;
  padding: 12px;
  background: var(--accent);
  border: none;
  color: white;
  font-weight: bold;
  border-radius: 8px;
  cursor: pointer;
  transition: opacity 0.2s;
}

.settings button:hover {
  opacity: 0.9;
}

.container {
  max-width: 900px;
  margin: auto;
  padding: 0 15px 30px 15px;
  display: flex;
  flex-direction: column;
  gap: 20px;
}

.card {
  background: var(--card);
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
  padding: 25px;
  border-radius: 24px;
  border: 1px solid var(--glass-border);
  box-shadow: 0 4px 15px rgba(0,0,0,0.05);
  transition: background 0.3s ease;
}

.card:hover {
  background: var(--card-hover);
}

.card h3 {
  margin-top: 0;
  font-size: 16px;
  color: var(--muted);
  font-weight: 600;
}

/* CURRENT WEATHER */
.current {
  text-align: center;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 40px 20px;
}

.current .material-symbols-outlined {
  font-size: 80px;
  margin-bottom: 10px;
  color: var(--accent);
}

.temp {
  font-size: 72px;
  font-weight: 800;
  line-height: 1;
  margin-bottom: 10px;
}

.status {
  font-size: 20px;
  font-weight: 500;
  margin-bottom: 5px;
}

.wind {
  color: var(--muted);
  font-size: 15px;
}

/* HOURLY FORECAST */
.row {
  display: flex;
  gap: 12px;
  overflow-x: auto;
  padding-bottom: 10px;
  scrollbar-width: none; /* Firefox */
}
.row::-webkit-scrollbar {
  display: none; /* Chrome/Safari */
}

.hour {
  min-width: 80px;
  text-align: center;
  padding: 15px 10px;
  border-radius: 16px;
  background: rgba(128, 128, 128, 0.05);
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.hour .material-symbols-outlined {
  font-size: 32px;
}

/* DAILY FORECAST */
.day {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  align-items: center;
  padding: 15px;
  border-radius: 16px;
  margin-bottom: 8px;
  background: rgba(128, 128, 128, 0.05);
}

.day:last-child {
  margin-bottom: 0;
}

.left {
  display: flex;
  align-items: center;
  gap: 12px;
  font-weight: 600;
}

.left .material-symbols-outlined {
  font-size: 28px;
  color: var(--accent);
}

.center-temp {
  text-align: center;
  font-weight: 600;
}

.right-wind {
  text-align: right;
  color: var(--muted);
  font-size: 14px;
}

#alertBox {
  margin-top: 15px;
  color: #ff4d4d;
  font-weight: bold;
  background: rgba(255, 77, 77, 0.1);
  padding: 10px 20px;
  border-radius: 8px;
  display: none;
}

/* Responsive adjustments */
@media (max-width: 600px) {
  .temp { font-size: 60px; }
  .day { font-size: 14px; }
  .left .material-symbols-outlined { font-size: 24px; }
}
</style>
</head>

<body>

<div class="topbar">
  <div class="city" id="cityName">Detecting Location...</div>
  <span class="material-symbols-outlined icon-btn" onclick="toggleSettings()">settings</span>
</div>

<div class="settings" id="settings">
  <label>City Search</label>
  <input id="cityInput" placeholder="Enter city name...">

  <label>Temperature Unit</label>
  <select id="unit">
    <option value="C">Celsius (°C)</option>
    <option value="F">Fahrenheit (°F)</option>
  </select>

  <label>Wind Speed Unit</label>
  <select id="windUnit">
    <option value="kmh">Kilometers (km/h)</option>
    <option value="mph">Miles (mph)</option>
  </select>

  <button onclick="applySettings()">Update Weather</button>
</div>

<div class="container">
  <div class="card current">
    <div class="material-symbols-outlined" id="icon">hourglass_empty</div>
    <div class="temp" id="temp">--°</div>
    <div class="status" id="status">Loading data...</div>
    <div class="wind" id="wind"></div>
    <div id="alertBox"></div>
  </div>

  <div class="card">
    <h3>Hourly Forecast</h3>
    <div class="row" id="hourly"></div>
  </div>

  <div class="card">
    <h3>7-Day Forecast</h3>
    <div id="daily"></div>
  </div>
</div>

<script>
let unit = "C";
let windUnit = "kmh";
let city = "";

/* AUTO THEME BASED ON TIME */
function setTheme() {
  let h = new Date().getHours();
  // Light mode between 7 AM and 6 PM
  document.body.classList.toggle("light", h >= 7 && h <= 18);
}
setTheme();

/* SETTINGS PANEL LOGIC */
function toggleSettings() {
  let s = document.getElementById("settings");
  s.style.display = s.style.display === "block" ? "none" : "block";
}

function applySettings() {
  let newCity = document.getElementById("cityInput").value.trim();
  if(newCity) city = newCity;
  unit = document.getElementById("unit").value;
  windUnit = document.getElementById("windUnit").value;
  toggleSettings();
  
  if (city) {
    loadCity(city);
  } else {
    navigator.geolocation.getCurrentPosition(
      pos => loadWeather(pos.coords.latitude, pos.coords.longitude),
      () => loadCity("New York")
    );
  }
}

/* WMO WEATHER CODES -> MODERN MATERIAL SYMBOLS */
function icon(code) {
  const map = {
    0: "clear_day", // Clear sky
    1: "partly_cloudy_day", // Mainly clear
    2: "partly_cloudy_day", // Partly cloudy
    3: "cloud", // Overcast
    45: "foggy", // Fog
    48: "foggy", // Depositing rime fog
    51: "rainy_light", // Light drizzle
    53: "rainy_light", // Moderate drizzle
    55: "rainy", // Dense drizzle
    56: "weather_mix", // Freezing Drizzle
    57: "weather_mix", // Freezing Drizzle
    61: "rainy", // Slight rain
    63: "rainy", // Moderate rain
    65: "water_drop", // Heavy rain
    66: "weather_snowy_rainy", // Freezing Rain
    67: "weather_snowy_rainy", // Freezing Rain
    71: "cloudy_snowing", // Slight snow
    73: "snowing", // Moderate snow
    75: "weather_snowy", // Heavy snow
    77: "ac_unit", // Snow grains
    80: "rainy", // Slight showers
    81: "rainy", // Moderate showers
    82: "storm", // Violent showers
    85: "cloudy_snowing", // Snow showers
    86: "snowing", // Heavy snow showers
    95: "thunderstorm", // Thunderstorm
    96: "thunderstorm", // Thunderstorm with hail
    99: "severe_cold" // Heavy hail thunderstorm
  };
  return map[code] || "cloud"; // Default fallback
}

/* WMO WEATHER CODES -> HUMAN READABLE AI DESCRIPTIONS */
function weatherText(code) {
  const codes = {
    0: "Clear Sky",
    1: "Mainly Clear",
    2: "Partly Cloudy",
    3: "Overcast",
    45: "Fog",
    48: "Rime Fog",
    51: "Light Drizzle",
    53: "Moderate Drizzle",
    55: "Dense Drizzle",
    56: "Light Freezing Drizzle",
    57: "Dense Freezing Drizzle",
    61: "Slight Rain",
    63: "Moderate Rain",
    65: "Heavy Rain",
    66: "Light Freezing Rain",
    67: "Heavy Freezing Rain",
    71: "Slight Snowfall",
    73: "Moderate Snowfall",
    75: "Heavy Snowfall",
    77: "Snow Grains",
    80: "Slight Rain Showers",
    81: "Moderate Rain Showers",
    82: "Violent Rain Showers",
    85: "Slight Snow Showers",
    86: "Heavy Snow Showers",
    95: "Thunderstorm",
    96: "Thunderstorm & Hail",
    99: "Heavy Thunderstorm & Hail"
  };
  return codes[code] || "Weather Update";
}

/* WEEKDAY SYSTEM */
function getDayName(index) {
  if (index === 0) return "Today";
  let days = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
  let d = new Date();
  d.setDate(d.getDate() + index);
  return days[d.getDay()];
}

/* FORMAT 12-HOUR TIME */
function formatTime(hourIndex) {
  let hour = hourIndex % 24;
  let ampm = hour >= 12 ? 'PM' : 'AM';
  hour = hour % 12;
  hour = hour ? hour : 12; // the hour '0' should be '12'
  return `${hour} ${ampm}`;
}

/* INITIALIZATION */
window.onload = () => {
  if (navigator.geolocation) {
    navigator.geolocation.getCurrentPosition(
      pos => loadWeather(pos.coords.latitude, pos.coords.longitude),
      () => loadCity("New York") // Fallback if user denies location
    );
  } else {
    loadCity("New York");
  }
};

/* FETCH CITY COORDINATES */
async function loadCity(searchCity = city) {
  if (!searchCity) searchCity = "New York";
  document.getElementById("cityName").innerText = "Searching...";
  
  try {
    let geo = await fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${searchCity}`).then(r => r.json());
    if (!geo.results || geo.results.length === 0) {
      document.getElementById("cityName").innerText = "City Not Found";
      return;
    }
    let loc = geo.results[0];
    loadWeather(loc.latitude, loc.longitude, loc.name + (loc.admin1 ? `, ${loc.admin1}` : ''));
  } catch(e) {
    document.getElementById("cityName").innerText = "Network Error";
  }
}

/* FETCH WEATHER DATA */
async function loadWeather(lat, lon, name = "Your Location") {
  document.getElementById("cityName").innerText = name;
  
  let url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&hourly=temperature_2m,weathercode,wind_speed_10m&daily=temperature_2m_max,temperature_2m_min,weathercode,wind_speed_10m_max&temperature_unit=${unit === "F" ? "fahrenheit" : "celsius"}&wind_speed_unit=${windUnit === "mph" ? "mph" : "kmh"}&timezone=auto`;

  try {
    let data = await fetch(url).then(r => r.json());
    current(data);
    hourly(data);
    daily(data);
    alerts(data);
  } catch(e) {
    document.getElementById("status").innerText = "Failed to load weather data.";
  }
}

/* RENDER CURRENT WEATHER */
function current(data) {
  let now = new Date().getHours(); // Current local hour matches API index since timezone=auto
  let temp = Math.round(data.hourly.temperature_2m[now]);
  let code = data.hourly.weathercode[now];
  let wind = Math.round(data.hourly.wind_speed_10m[now]);

  document.getElementById("icon").innerText = icon(code);
  document.getElementById("temp").innerText = temp + "°" + unit;
  document.getElementById("status").innerText = weatherText(code);
  document.getElementById("wind").innerText = "Wind: " + wind + " " + windUnit;
}

/* RENDER HOURLY DATA */
function hourly(data) {
  let box = document.getElementById("hourly");
  box.innerHTML = "";

  let now = new Date().getHours();

  for (let i = now; i < now + 24; i++) {
    let displayTime = i === now ? "Now" : formatTime(i);
    let temp = Math.round(data.hourly.temperature_2m[i]);
    let code = data.hourly.weathercode[i];

    box.innerHTML += `
      <div class="hour">
        <div style="font-size: 13px; font-weight: bold;">${displayTime}</div>
        <span class="material-symbols-outlined" style="color: var(--accent);">${icon(code)}</span>
        <div style="font-size: 18px; font-weight: bold;">${temp}°</div>
      </div>
    `;
  }
}

/* RENDER DAILY DATA */
function daily(data) {
  let box = document.getElementById("daily");
  box.innerHTML = "";

  for (let i = 0; i < 7; i++) {
    let minT = Math.round(data.daily.temperature_2m_min[i]);
    let maxT = Math.round(data.daily.temperature_2m_max[i]);
    let wind = Math.round(data.daily.wind_speed_10m_max[i]);

    box.innerHTML += `
      <div class="day">
        <div class="left">
          <span class="material-symbols-outlined">${icon(data.daily.weathercode[i])}</span>
          <span>${getDayName(i)}</span>
        </div>
        <div class="center-temp">
          <span style="color: var(--muted);">${minT}°</span> / <b>${maxT}°</b>
        </div>
        <div class="right-wind">
          🌬️ ${wind} ${windUnit}
        </div>
      </div>
    `;
  }
}

/* HANDLE ALERTS */
function alerts(data) {
  let now = new Date().getHours();
  let code = data.hourly.weathercode[now];
  let box = document.getElementById("alertBox");

  if (code >= 80 || code === 65 || code === 67 || code === 75) {
    box.style.display = "block";
    box.innerHTML = `⚠ Severe Weather Alert: ${weatherText(code)}`;
  } else {
    box.style.display = "none";
    box.innerHTML = "";
  }
}
</script>

</body>
</html>
